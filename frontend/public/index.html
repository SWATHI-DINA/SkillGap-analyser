<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ✅ Custom SVG gem favicon — crisp at any size, fully visible in tab -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23cfe8d5'/><stop offset='50%25' stop-color='%239ac5f4'/><stop offset='100%25' stop-color='%23d6c8f7'/></linearGradient></defs><polygon points='50,5 90,30 90,70 50,95 10,70 10,30' fill='url(%23g)'/><polygon points='50,5 90,30 50,45 10,30' fill='rgba(255,255,255,0.25)'/><polygon points='50,45 90,30 90,70 50,95 10,70 10,30' fill='rgba(0,0,0,0.08)'/></svg>" />

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700" rel="stylesheet" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#A3B18A" />
    <meta name="description" content="SkillUp — AI-Powered Career Upskilling Platform. Analyze your resume, close skill gaps, and ace your interviews." />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ✅ Title shown on all pages -->
    <title>SkillUp | AI Career Platform</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- ✅ Keeps title consistent across all page navigations -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var observer = new MutationObserver(function () {
          if (document.title !== "SkillUp | AI Career Platform") {
            document.title = "SkillUp | AI Career Platform";
          }
        });
        var titleEl = document.querySelector("title");
        if (titleEl) observer.observe(titleEl, { childList: true });
      });
    </script>
  </body>
</html>
